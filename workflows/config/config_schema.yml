$schema: "https://json-schema.org/draft/2020-12/schema"
description: Configuration schema for generate_divref.smk

type: object
additionalProperties: false

properties:
  reference_genome_uri:
    type: string
    description: GCS URI for the reference genome.
    default: gs://hail-common/references/Homo_sapiens_assembly38.fasta.gz

  reference_genome_base_name:
    type: string
    description: Base name for the reference genome.
    default: Homo_sapiens_assembly38

  chromosomes:
    type: array
    items:
      type: string
    minItems: 1
    uniqueItems: true
    description: List of chromosomes to generate the resource for.
    default: ["chr1", "chr2", "chr3", "chr4", "chr5", "chr6", "chr7", "chr8", "chr9", "chr10", "chr11", "chr12", "chr13", "chr14", "chr15", "chr16", "chr17", "chr18", "chr19", "chr20", "chr21", "chr22", "chrX", "chrY"]

  populations:
    type: array
    items:
      type: string
    minItems: 1
    uniqueItems: true
    description: List of populations to use.
    default: ["afr", "amr", "eas", "sas", "nfe"]

  hgdp_1kg_phased_bcf_prefix:
    type: string
    description: Prefix of the GCS URI for the HGDP+1KG phased BCF files.
    default: "gs://gcp-public-data--gnomad/resources/hgdp_1kg/phased_haplotypes_v2/hgdp1kgp_"

  hgdp_1kg_phased_bcf_suffix:
    type: string
    description: Suffix of the GCS URI for the HGDP+1KG phased BCF files.
    default: ".filtered.SNV_INDEL.phased.shapeit5.bcf"

  hgdp_1kg_variant_annotation_hail_table:
    type: string
    description: GCS URI to the HGDP+1KG gnomAD variant annotations Hail table.
    default: "gs://gcp-public-data--gnomad/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.hgdp_1kg_subset_variant_annotations.ht"

  hgdp_1kg_sample_metadata_hail_table:
    type: string
    description: GCS URI to the HGDP+1KG gnomAD sample metadata Hail table.
    default: "gs://gcp-public-data--gnomad/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.hgdp_1kg_subset_sample_meta.ht"

  hgdp_1kg_min_pop_variant_allele_freq:
    type: number
    minimum: 0
    maximum: 1
    description: |
      Minimum variant allele frequency for at least one selected population when running
      `divref extract-gnomad-afs` and `divref compute-haplotypes`.
    default: 0.005

  hgdp_1kg_min_estimated_gnomad_haplotype_allele_freq:
    type: number
    minimum: 0
    maximum: 1
    description: |
      Minimum estimated gnomAD haplotype allele frequency for inclusion in output. Used by
      `divref compute-haplotypes`.
    default: 0.005

  hgdp_1kg_haplotype_window_size:
    type: integer
    minimum: 1
    description: Window size in bp for grouping variants into haplotypes.
    default: 100

  gnomad_variant_annotation_source:
    type: string
    enum: ["JOINT_41", "GENOMES_312", "HGDP_1KG_312"]
    description: |
      Source of the gnomAD variant annotations Hail table. Supported options:
      JOINT_41 = v4.1 joint exomes (730K) + genomes (76K)
        gs://gcp-public-data--gnomad/release/4.1/ht/joint/gnomad.joint.v4.1.sites.ht
      GENOMES_312 = v3.1.2 genomes (76K)
        gs://gcp-public-data--gnomad/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.sites.ht
      HGDP_1KG_312 = v3.1.2 HGDP+1KG subset genomes (4K, uses frequencies from genomes 76K)
        gs://gcp-public-data--gnomad/release/3.1.2/ht/genomes/gnomad.genomes.v3.1.2.hgdp_1kg_subset_variant_annotations.ht
    default: "JOINT_41"

  gnomad_variant_min_pop_variant_allele_freq:
    type: number
    minimum: 0
    maximum: 1
    description: |
      Minimum variant allele frequency for at least one selected population when running
      `divref extract-gnomad-single-afs`.
    default: 0.005

  sequence_window_size:
    type: integer
    description: |
      Window size used when generating haplotypes; used as the context size when constructing
      sequence strings and stored in the index.
    minimum: 1
    default: 25

  version:
    type: string
    description: Version identifier for output resource.
    example: 1.0

  polars_chunk_size:
    type: integer
    minimum: 10000
    description: |
      Number of sequence table rows to read from intermediate TSV file and insert into database at a
      time. Recommended maximum 1,000,000 for typical laptop.
    default: 100000

  work_dir:
    type: string
    description: Path to the working directory for intermediate files.
    default: data/work

  tmp_dir:
    type: string
    description: Path to the temporary files directory.
    default: /tmp

required:
  - version
